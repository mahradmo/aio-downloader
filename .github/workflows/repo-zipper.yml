name: Repo Zipper (99MB splits)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to zip (default: current branch)'
        required: false
        default: ''

jobs:
  zip-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Install zip
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zip

      - name: Zip full repo into 99MB splits
        run: |
          # Create output folder
          mkdir -p ziped

          # Create a temporary copy of the repo (excluding .git)
          TMP_DIR="tmp_repo"
          mkdir -p "$TMP_DIR"
          # Copy everything except .git and the output folder itself
          rsync -av --exclude='.git' --exclude='ziped' ./ "$TMP_DIR/" > /dev/null

          # Zip and split in one command
          (cd "$TMP_DIR" && zip -r -s 99m "../ziped/repo.zip" .)

          # Cleanup temp directory
          rm -rf "$TMP_DIR"

          echo "Split archive created in ziped/:"
          ls -lh ziped/

      - name: Commit and push ziped folder
        env:
          BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

          if [ -z "$(ls -A ziped/ 2>/dev/null)" ]; then
            echo "No split files created – nothing to commit."
            exit 0
          fi

          git add ziped/
          git commit -m "📦 Add repo zip splits (99MB) [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              echo "Push failed."
              [ $i -lt $RETRIES ] && sleep 3 || exit 1
            fi
          done
