name: Save Docker Image as Offline File

on:
  workflow_dispatch:
    inputs:
      docker_image:
        description: 'Docker image to pull (e.g., user/imagename)'
        required: true
        default: 'user/imagename'

jobs:
  save-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull Docker image
        run: |
          docker pull "${{ github.event.inputs.docker_image }}"

      - name: Save image to tar file
        run: |
          IMAGE_NAME="${{ github.event.inputs.docker_image }}"
          SAFE_NAME=$(echo "$IMAGE_NAME" | tr '/' '_' | tr ':' '_')
          docker save "$IMAGE_NAME" -o "${SAFE_NAME}.tar"
          echo "SAFE_NAME=${SAFE_NAME}" >> $GITHUB_ENV
          echo "Saved as ${SAFE_NAME}.tar"

      - name: Prepare output folder
        run: rm -rf docker-image && mkdir -p docker-image

      - name: Store image (raw or split) – using proven zip method
        run: |
          TAR_FILE="${SAFE_NAME}.tar"
          SIZE=$(stat -c %s "$TAR_FILE")
          MAX_SIZE=$((99 * 1024 * 1024))

          if [ "$SIZE" -lt "$MAX_SIZE" ]; then
            echo "File size ${SIZE} bytes is under 99MB → saving raw tar"
            cp "$TAR_FILE" docker-image/
            echo "OUTPUT_FILES=${TAR_FILE}" >> $GITHUB_ENV
          else
            echo "File size ${SIZE} bytes is >= 99MB → creating split zip"
            
            # Use exactly the same pattern as your direct-downloader
            # Create a temporary folder containing only the tar file
            TMP_ZIP_DIR="tmp_split_zip"
            mkdir -p "$TMP_ZIP_DIR"
            cp "$TAR_FILE" "$TMP_ZIP_DIR/"
            
            # Determine output zip name with collision avoidance (clean folder, so no collisions)
            ZIP_NAME="${SAFE_NAME}.zip"
            
            # Create split zip (produces .zip, .z01, .z02, ...) inside docker-image/
            (cd "$TMP_ZIP_DIR" && zip -9 -s 99m "../docker-image/${ZIP_NAME}" "$TAR_FILE")
            
            # Cleanup
            rm -rf "$TMP_ZIP_DIR"
            
            # List all split files for logging and commit message
            SPLIT_FILES=$(ls docker-image/${SAFE_NAME}.zip* docker-image/${SAFE_NAME}.z?? 2>/dev/null | xargs -n1 basename | tr '\n' ' ')
            echo "Split files created: $SPLIT_FILES"
            echo "OUTPUT_FILES=$SPLIT_FILES" >> $GITHUB_ENV
          fi

      - name: Create README with usage instructions
        run: |
          cat > docker-image/README.md << 'EOF'
          # Offline Docker Image

          This folder contains a saved Docker image (raw `.tar` or split ZIP parts).

          ## To use on an isolated PC
          
          ### 1. Load the image into Docker
          ```bash
          docker load -i image.tar
          ```

          ### 2. Run the container
          ```bash
          docker run full_image_name
          ```
          *Replace `full_image_name` with the original image tag (e.g. `user/imagename`).*

          ---
          *Generated by GitHub Actions on $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
          EOF

      - name: Commit and push image file(s)
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

          if [ -z "$(ls -A docker-image/ 2>/dev/null)" ]; then
            echo "No image files created – nothing to commit."
            exit 0
          fi

          git add docker-image/
          git commit -m "Add offline Docker image: ${{ env.SAFE_NAME }} [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              echo "Push failed."
              [ $i -lt $RETRIES ] && sleep 3 || exit 1
            fi
          done

      - name: Cleanup temporary tar
        if: always()
        run: rm -f "${SAFE_NAME}.tar"
